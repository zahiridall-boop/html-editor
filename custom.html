<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor HTML Mas-Way</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />

    <style>
        :root {
            --primary: #6366f1;
            --border: #e2e8f0;
            --dark-bg: #272822;
            --tab-bg: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; background: #fff; }

        #left-pane { 
            width: 35%; 
            min-width: 300px; 
            display: flex; 
            flex-direction: column; 
            background: #fff;
            border-right: 1px solid var(--border);
            z-index: 10;
        }

        .editor-toolbar { padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; background: #fff; }
        .tab-bar { display: flex; padding: 0 10px; background: var(--tab-bg); border-bottom: 1px solid var(--border); }
        .tab { 
            padding: 10px 20px; font-size: 11px; font-weight: 800; border: none; 
            cursor: pointer; color: #94a3b8; background: transparent; 
            border-bottom: 2px solid transparent; transition: 0.2s;
        }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); background: #fff; }

        .editor-container { flex: 1; position: relative; overflow: hidden; background: #fff; }
        
        #ide-editor { 
            position: absolute; inset: 0; padding: 30px; outline: none; 
            overflow-y: auto; line-height: 1.7; font-size: 16px; color: #334155;
            white-space: pre-wrap; word-wrap: break-word;
        }

        /* --- STYLING SOURCE EDITOR DENGAN WORD WRAP --- */
        .source-wrapper {
            position: absolute; inset: 0; display: none;
            background: var(--dark-bg);
        }

        #source-editor, #highlighting-content {
            margin: 0; padding: 20px;
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px; line-height: 1.5;
            tab-size: 4; -moz-tab-size: 4;
            
            /* Logic Word Wrap */
            white-space: pre-wrap !important; 
            word-wrap: break-word !important; 
            overflow-wrap: break-word !important;
            border: none; outline: none;
        }

        #source-editor {
            z-index: 1;
            background: transparent;
            color: transparent;
            caret-color: white;
            resize: none;
            overflow-y: auto;
        }

        #highlighting-content {
            z-index: 0;
            pointer-events: none;
            overflow-y: auto; /* Harus sama dengan textarea agar scroll sinkron */
            background: transparent;
        }

        #highlighting-code {
            white-space: pre-wrap !important;
            word-wrap: break-word !important;
        }
        /* ----------------------------------- */

        #resizer { width: 4px; background: var(--border); cursor: col-resize; transition: 0.2s; z-index: 20; }
        #resizer:hover, .dragging #resizer { background: var(--primary); width: 6px; }

        #right-pane { 
            flex: 1; position: relative; background: #cbd5e1; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; 
        }

        #btn-toggle-ui {
            position: absolute; top: 20px; right: 20px; width: 45px; height: 45px; border-radius: 12px;
            background: var(--primary); color: white; border: none; cursor: pointer; z-index: 101;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: 0.3s;
        }

        .zoom-ui {
            position: absolute; top: 75px; right: 20px; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px); padding: 18px; border-radius: 15px; display: flex;
            flex-direction: column; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 100; border: 1px solid #fff; transition: 0.4s; transform-origin: top right;
        }
        .zoom-ui.hidden { transform: scale(0.8) translateY(-20px); opacity: 0; pointer-events: none; }

        .paper-field { display: flex; flex-direction: column; gap: 4px; }
        .paper-field label { font-size: 10px; font-weight: 800; color: #64748b; letter-spacing: 0.5px; }
        .paper-field input { 
            width: 100%; padding: 10px; font-size: 13px; 
            border: 1px solid var(--border); border-radius: 8px; outline: none; 
            font-family: 'Fira Code', monospace; background: #fff;
        }

        .orientation-group { display: flex; gap: 6px; }
        .btn-orient { 
            flex: 1; padding: 10px; border: 1px solid var(--border); 
            background: #fff; border-radius: 8px; cursor: pointer; 
            font-size: 10px; font-weight: 800; color: #64748b; transition: 0.2s;
        }
        .btn-orient.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .zoom-controls { display: flex; align-items: center; justify-content: space-between; background: #f1f5f9; padding: 5px; border-radius: 10px; }
        .zoom-controls button { border: none; background: #fff; width: 35px; height: 35px; border-radius: 7px; cursor: pointer; color: #64748b; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .zoom-controls button:hover { background: var(--primary); color: #fff; }
        #zoom-val { font-size: 12px; font-weight: 800; color: var(--primary); font-family: 'Fira Code', monospace; }

        .canvas-container {
            width: 29.7cm; height: 21cm; background: #fff;
            box-shadow: 0 0 60px rgba(0,0,0,0.2); transform-origin: center center;
            transition: transform 0.2s ease-out, width 0.3s, height 0.3s;
            position: relative; overflow: hidden; 
        }

        #preview-frame { width: 100%; height: 100%; border: none; } 
        .btn-tool { width: 38px; height: 38px; border-radius: 8px; border: 1px solid var(--border); background: #fff; cursor: pointer; color: #475569; transition: 0.2s; }
        .btn-tool:hover { background: #f8fafc; border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>

<div id="left-pane">
    <div class="editor-toolbar">
        <span style="font-weight: 900; color: var(--primary); font-size: 12px; margin-right: auto; letter-spacing: 1px;">STUDIO EDITOR HTML MAS-WAY</span>
        <button class="btn-tool" title="Bold" onmousedown="event.preventDefault(); exec('bold')"><i class="fas fa-bold"></i></button>
        <button class="btn-tool" title="Italic" onmousedown="event.preventDefault(); exec('italic')"><i class="fas fa-italic"></i></button>
        <button class="btn-tool" title="Clean" onclick="cleanHTML()"><i class="fas fa-eraser"></i></button>
    </div>
    <div class="tab-bar">
        <button class="tab active" onclick="showTab('ide')">VISUAL</button>
        <button class="tab" onclick="showTab('src')">SOURCE CODE (SC)</button>
    </div>
    <div class="editor-container">
        <div id="ide-editor" contenteditable="true" spellcheck="false"></div>
        <div class="source-wrapper" id="source-wrapper">
            <pre id="highlighting-content" aria-hidden="true"><code class="language-html" id="highlighting-code"></code></pre>
            <textarea id="source-editor" spellcheck="false" placeholder="Write code here..." oninput="updateHighlighting(this.value); syncWithIDE();" onscroll="syncScroll(this)"></textarea>
        </div>
    </div>
</div>

<div id="resizer"></div>

<div id="right-pane">
    <button id="btn-toggle-ui" onclick="toggleUI()" title="Settings">
        <i class="fas fa-cog"></i>
    </button>

    <div class="zoom-ui hidden" id="setting-panel">
        <div class="orientation-group">
            <button class="btn-orient" id="btn-portrait" onclick="setOrientation('p')">PORTRAIT</button>
            <button class="btn-orient active" id="btn-landscape" onclick="setOrientation('l')">LANDSCAPE</button>
        </div>
        <div class="paper-field">
            <label>WIDTH (CM)</label>
            <input type="number" id="width-cm" value="29.7" step="0.1" oninput="updatePaperSize()">
        </div>
        <div class="paper-field">
            <label>HEIGHT (CM)</label>
            <input type="number" id="height-cm" value="21" step="0.1" oninput="updatePaperSize()">
        </div>
        <hr style="border: none; border-top: 1px solid var(--border); margin: 5px 0;">
        <div class="zoom-controls">
            <button onclick="zoom(-0.1)"><i class="fas fa-minus"></i></button>
            <span id="zoom-val">100%</span>
            <button onclick="zoom(0.1)"><i class="fas fa-plus"></i></button>
        </div>
        <button onclick="resetZoom()" style="width: 100%; padding: 10px; border: none; background: transparent; color: var(--primary); cursor: pointer; font-size: 11px; font-weight: 800;">
            <i class="fas fa-sync-alt"></i> RESET ZOOM
        </button>
    </div>
    
    <div class="canvas-container" id="canvas">
        <iframe id="preview-frame" scrolling="no"></iframe>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

<script>
    const canvas = document.getElementById('canvas');
    const zoomVal = document.getElementById('zoom-val');
    const ide = document.getElementById('ide-editor');
    const src = document.getElementById('source-editor');
    const srcWrapper = document.getElementById('source-wrapper');
    const highlightCode = document.getElementById('highlighting-code');
    const highlightContent = document.getElementById('highlighting-content');
    const iframe = document.getElementById('preview-frame');
    const leftPane = document.getElementById('left-pane');
    const resizer = document.getElementById('resizer');
    const widthInput = document.getElementById('width-cm');
    const heightInput = document.getElementById('height-cm');
    const settingPanel = document.getElementById('setting-panel');
    const toggleBtn = document.getElementById('btn-toggle-ui');

    let currentScale = 1.0; 

    function updateHighlighting(text) {
        let result_element = highlightCode;
        if (text[text.length-1] == "\n") text += " ";
        result_element.innerHTML = text.replace(/&/g, "&amp;").replace(/</g, "&lt;");
        Prism.highlightElement(result_element);
    }

    function syncScroll(el) {
        highlightContent.scrollTop = el.scrollTop;
    }

    function fitToScreen() {
        const padding = 40;
        const rPane = document.getElementById('right-pane');
        if(!rPane) return;
        const availableW = rPane.offsetWidth - padding;
        const availableH = rPane.offsetHeight - padding;
        const canvasW = parseFloat(widthInput.value) * 37.8;
        const canvasH = parseFloat(heightInput.value) * 37.8;
        const scaleX = availableW / canvasW;
        const scaleY = availableH / canvasH;
        currentScale = Math.min(scaleX, scaleY, 1.0);
        applyScale();
    }

    [ide, src].forEach(el => {
        el.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                if (el === src) {
                    const start = this.selectionStart;
                    const end = this.selectionEnd;
                    this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                    this.selectionStart = this.selectionEnd = start + 4;
                    updateHighlighting(this.value);
                } else {
                    document.execCommand('insertHTML', false, '&nbsp;&nbsp;&nbsp;&nbsp;');
                }
                update();
            }
        });
    });

    function cleanHTML() {
        ide.innerHTML = ide.innerText.replace(/\n/g, '<br>');
        update();
    }

    function toggleUI() {
        const isHidden = settingPanel.classList.toggle('hidden');
        toggleBtn.querySelector('i').className = isHidden ? 'fas fa-cog' : 'fas fa-times';
    }

    function setOrientation(mode) {
        let w = parseFloat(widthInput.value);
        let h = parseFloat(heightInput.value);
        if ((mode === 'l' && h > w) || (mode === 'p' && w > h)) {
            widthInput.value = h;
            heightInput.value = w;
        }
        document.getElementById('btn-portrait').classList.toggle('active', mode === 'p');
        document.getElementById('btn-landscape').classList.toggle('active', mode === 'l');
        updatePaperSize();
        fitToScreen();
    }

    function updatePaperSize() {
        canvas.style.width = widthInput.value + 'cm';
        canvas.style.height = heightInput.value + 'cm';
        update(); 
    }

    function zoom(delta) {
        currentScale = Math.min(Math.max(currentScale + delta, 0.1), 3.0);
        applyScale();
    }

    function resetZoom() { fitToScreen(); }

    function applyScale() {
        canvas.style.transform = `scale(${currentScale})`;
        zoomVal.innerText = Math.round(currentScale * 100) + '%';
    }

    let isDragging = false;
    resizer.addEventListener('mousedown', () => { isDragging = true; document.body.classList.add('dragging'); });
    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        let x = e.clientX;
        if (x > 250 && x < window.innerWidth - 100) {
            leftPane.style.width = x + 'px';
            fitToScreen();
        }
    });
    document.addEventListener('mouseup', () => { isDragging = false; document.body.classList.remove('dragging'); });

    function showTab(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(type === 'ide') {
            ide.style.display = 'block'; srcWrapper.style.display = 'none';
            document.querySelectorAll('.tab')[0].classList.add('active');
            ide.focus();
        } else {
            ide.style.display = 'none'; srcWrapper.style.display = 'block';
            document.querySelectorAll('.tab')[1].classList.add('active');
            updateHighlighting(src.value);
            src.focus();
        }
    }

    function syncWithIDE() {
        ide.innerHTML = src.value;
        update();
    }

    function update() {
        const content = (srcWrapper.style.display === 'block') ? src.value : ide.innerHTML;
        
        if (document.activeElement === src) {
            ide.innerHTML = content;
        }
        if (document.activeElement === ide) {
            src.value = content;
            updateHighlighting(content);
        }

        const doc = iframe.contentWindow.document;
        doc.open();
        doc.write(`
            <html>
            <head>
                <style>
                    * { box-sizing: border-box; }
                    body { 
                        margin: 0; padding: 0; background: white; 
                        overflow: hidden; height: 100vh; width: 100vw;
                        display: flex; justify-content: center; align-items: flex-start;
                        font-family: 'Inter', sans-serif;
                    }
                    #content-wrapper { 
                        width: 1000px; 
                        transform-origin: top center; 
                        padding: 40px;
                        word-wrap: break-word;
                        line-height: 1.6;
                    }
                </style>
            </head>
            <body>
                <div id="content-wrapper">${content}</div>
                <script>
                    function fitToPaper() {
                        const wrapper = document.getElementById('content-wrapper');
                        const paperW = window.innerWidth;
                        const paperH = window.innerHeight;
                        wrapper.style.transform = "scale(1)";
                        const contentW = wrapper.offsetWidth;
                        const contentH = wrapper.scrollHeight;
                        const scaleX = paperW / contentW;
                        const scaleY = paperH / contentH;
                        let finalScale = Math.min(scaleX, scaleY);
                        if (finalScale > 1) finalScale = 1;
                        wrapper.style.transform = "scale(" + finalScale + ")";
                    }
                    window.onload = fitToPaper;
                    window.onresize = fitToPaper;
                    new MutationObserver(fitToPaper).observe(document.body, { 
                        childList: true, subtree: true, characterData: true 
                    });
                <\/script>
            </body>
            </html>
        `);
        doc.close();
    }

    ide.addEventListener('input', update);
    function exec(cmd) { document.execCommand(cmd, false, null); update(); }

    window.addEventListener('resize', fitToScreen);
    setTimeout(() => {
        fitToScreen();
        update();
    }, 100);
</script>
</body>
</html>
